services:
  postgres:
    image: postgres:16
    env_file: .env
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: